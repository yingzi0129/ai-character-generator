name = "ai-character-generator-nextjs"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers Sites uploads ./dist and automatically provides the __STATIC_CONTENT binding.
# Do not declare a separate KV binding with the same name, or deploy fails with code 10053.
[site]
bucket = "./dist"